apiVersion: security.automatesecurity.github.io/v1alpha1
kind: SBOMReport
metadata:
  name: nginx-workload
  namespace: kubescan-system
  labels:
    security.automatesecurity.github.io/sbom: "true"
spec:
  imageRef: nginx:latest
  format: cyclonedx-json
  content: |
    {
      "bomFormat": "CycloneDX",
      "specVersion": "1.5",
      "metadata": {
        "component": {
          "type": "container",
          "name": "nginx:latest"
        }
      },
      "components": [
        {
          "type": "library",
          "name": "nginx",
          "version": "1.25.0",
          "purl": "pkg:deb/debian/nginx@1.25.0"
        }
      ]
    }

