apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: payments
spec:
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api
      hostPID: true
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: api
          image: nginx:latest
          securityContext:
            privileged: true
      volumes:
        - name: kubelet
          hostPath:
            path: /var/lib/kubelet
---
apiVersion: v1
kind: Service
metadata:
  name: public-api
  namespace: payments
spec:
  type: LoadBalancer
  selector:
    app: api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wildcard
  namespace: payments
rules:
  - verbs: ["*"]
    resources: ["pods"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: payments
rules:
  - verbs: ["get", "list"]
    resources: ["secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wildcard-bind
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wildcard
subjects:
  - kind: ServiceAccount
    namespace: payments
    name: api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-bind
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-reader
subjects:
  - kind: ServiceAccount
    namespace: payments
    name: api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-admin-bind
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    namespace: payments
    name: api
