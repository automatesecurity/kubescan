                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                    key:
                      type: string
                    authSecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        key:
                          type: string
                policyBundleRef:
                  type: object
                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                    key:
                      type: string
                    authSecretRef:
                      type: object
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        key:
                          type: string
                rulesBundleRef:
