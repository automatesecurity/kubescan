                  items:
                    type: string
                excludeKinds:
                  type: array
                  items:
                    type: string
                includeNamespaces:
                  type: array
                  items:
                    type: string
                excludeNamespaces:
                  type: array
                  items:
                    type: string
                bundleKeyRef:
