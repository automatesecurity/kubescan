name: Vulnerability DB

on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Source manifest to build from
        required: false
        default: ./examples/vulndb-sources-public.yaml
      release_tag:
        description: Release tag to publish DB artifacts to
        required: false
        default: vulndb-latest
  schedule:
    - cron: "0 6 * * *"

concurrency:
  group: vulndb-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      MANIFEST_PATH: ${{ inputs.manifest_path || './examples/vulndb-sources-public.yaml' }}
      RELEASE_TAG: ${{ inputs.release_tag || 'vulndb-latest' }}
      DB_PATH: dist/kubescan-vulndb.sqlite
      METADATA_PATH: dist/kubescan-vulndb.sqlite.metadata.json
      BUNDLE_PATH: dist/kubescan-vulndb.sqlite.sigstore.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Build vulnerability database
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          go run ./cmd/kubescan db build \
            --source-manifest "$MANIFEST_PATH" \
            --out "$DB_PATH" \
            --metadata-out "$METADATA_PATH"

      - name: Sign vulnerability database with Sigstore
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes --bundle "$BUNDLE_PATH" "$DB_PATH"

      - name: Verify vulnerability database Sigstore bundle
        shell: bash
        run: |
          set -euo pipefail
          cosign verify-blob \
            --new-bundle-format \
            --bundle "$BUNDLE_PATH" \
            --certificate-identity-regexp 'https://github.com/.+/.+/.github/workflows/vulndb.yaml@.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$DB_PATH"

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          metadata = json.loads(Path("dist/kubescan-vulndb.sqlite.metadata.json").read_text())
          notes = "\n".join([
              "Latest scheduled Kubescan vulnerability database artifact.",
              "",
              f"- Source manifest: `{Path('${{ env.MANIFEST_PATH }}').as_posix()}`",
              f"- Generated at: `{metadata['generatedAt']}`",
              f"- Database built at: `{metadata['dbBuiltAt']}`",
              f"- Advisory count: `{metadata['dbAdvisoryCount']}`",
              f"- Schema: `{metadata['dbSchema']} {metadata['dbSchemaVersion']}`",
              "",
              "Assets:",
              "- `kubescan-vulndb.sqlite`",
              "- `kubescan-vulndb.sqlite.metadata.json`",
              "- `kubescan-vulndb.sqlite.sigstore.json`",
          ])
          Path("dist/vulndb-release-notes.md").write_text(notes + "\n")
          PY

      - name: Create or update vulnerability db release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "Kubescan vulnerability db" --notes-file dist/vulndb-release-notes.md
          else
            gh release edit "$RELEASE_TAG" --title "Kubescan vulnerability db" --notes-file dist/vulndb-release-notes.md
          fi
          gh release upload "$RELEASE_TAG" \
            "$DB_PATH" \
            "$METADATA_PATH" \
            "$BUNDLE_PATH" \
            --clobber

      - name: Upload vulnerability db artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kubescan-vulndb
          retention-days: 14
          path: |
            ${{ env.DB_PATH }}
            ${{ env.METADATA_PATH }}
            ${{ env.BUNDLE_PATH }}
