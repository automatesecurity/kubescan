name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release-binaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Run Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign release checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Verify release checksum signature
        run: |
          cosign verify-blob \
            --certificate dist/checksums.txt.pem \
            --signature dist/checksums.txt.sig \
            --certificate-identity-regexp 'https://github.com/.+/.+/.github/workflows/release.yaml@.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            dist/checksums.txt

      - name: Upload checksum signatures
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/checksums.txt.sig \
            dist/checksums.txt.pem \
            --clobber

  release-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set metadata
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push kubescan image
        id: image_cli
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/automatesecurity/kubescan:${{ steps.meta.outputs.version }}
            ghcr.io/automatesecurity/kubescan:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          labels: |
            org.opencontainers.image.title=kubescan
            org.opencontainers.image.description=Kubernetes security analysis CLI
            org.opencontainers.image.url=https://github.com/automatesecurity/kubescan
            org.opencontainers.image.source=https://github.com/automatesecurity/kubescan
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}

      - name: Build and push kubescan-operator image
        id: image_operator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.operator
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/automatesecurity/kubescan-operator:${{ steps.meta.outputs.version }}
            ghcr.io/automatesecurity/kubescan-operator:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          labels: |
            org.opencontainers.image.title=kubescan-operator
            org.opencontainers.image.description=Kubescan reporting operator
            org.opencontainers.image.url=https://github.com/automatesecurity/kubescan
            org.opencontainers.image.source=https://github.com/automatesecurity/kubescan
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}

      - name: Build and push kubescan-node-collector image
        id: image_node_collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.node-collector
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/automatesecurity/kubescan-node-collector:${{ steps.meta.outputs.version }}
            ghcr.io/automatesecurity/kubescan-node-collector:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          labels: |
            org.opencontainers.image.title=kubescan-node-collector
            org.opencontainers.image.description=Kubescan node collector
            org.opencontainers.image.url=https://github.com/automatesecurity/kubescan
            org.opencontainers.image.source=https://github.com/automatesecurity/kubescan
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}

      - name: Sign kubescan image
        run: |
          cosign sign --yes ghcr.io/automatesecurity/kubescan@${{ steps.image_cli.outputs.digest }}

      - name: Sign kubescan-operator image
        run: |
          cosign sign --yes ghcr.io/automatesecurity/kubescan-operator@${{ steps.image_operator.outputs.digest }}

      - name: Sign kubescan-node-collector image
        run: |
          cosign sign --yes ghcr.io/automatesecurity/kubescan-node-collector@${{ steps.image_node_collector.outputs.digest }}

      - name: Verify kubescan image signature
        run: |
          cosign verify \
            --certificate-identity-regexp 'https://github.com/.+/.+/.github/workflows/release.yaml@.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/automatesecurity/kubescan@${{ steps.image_cli.outputs.digest }}

      - name: Verify kubescan-operator image signature
        run: |
          cosign verify \
            --certificate-identity-regexp 'https://github.com/.+/.+/.github/workflows/release.yaml@.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/automatesecurity/kubescan-operator@${{ steps.image_operator.outputs.digest }}

      - name: Verify kubescan-node-collector image signature
        run: |
          cosign verify \
            --certificate-identity-regexp 'https://github.com/.+/.+/.github/workflows/release.yaml@.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/automatesecurity/kubescan-node-collector@${{ steps.image_node_collector.outputs.digest }}

      - name: Attest kubescan image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/automatesecurity/kubescan
          subject-digest: ${{ steps.image_cli.outputs.digest }}
          push-to-registry: true

      - name: Attest kubescan-operator image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/automatesecurity/kubescan-operator
          subject-digest: ${{ steps.image_operator.outputs.digest }}
          push-to-registry: true

      - name: Attest kubescan-node-collector image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/automatesecurity/kubescan-node-collector
          subject-digest: ${{ steps.image_node_collector.outputs.digest }}
          push-to-registry: true
